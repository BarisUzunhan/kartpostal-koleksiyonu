<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baska Topraklarin Renkleri</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/map.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="header-brand">
                <img src="images/logo.png" alt="Baska Topraklarin Renkleri" class="header-logo-img">
                <img src="images/headerorta.png" alt="" class="header-plane-img">
            </a>
            <button class="nav-toggle" id="nav-toggle" aria-label="Menü" aria-expanded="false">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <nav class="main-nav">
                <a href="index.html" class="nav-link active" data-i18n="navHome">Ana Sayfa</a>
                <a href="#" class="nav-link" id="nav-map-link" data-i18n="navMap">Harita</a>
                <a href="about.html" class="nav-link" data-i18n="navAbout">Hakkimda</a>
                <a href="what-to-do.html" class="nav-link" data-i18n="navWhatToDo">Ne Yapmaliyim?</a>
                <a href="tags.html" class="nav-link" data-i18n="navTags">Etiketler</a>
            </nav>
        </div>
    </header>

    <div class="filter-bar" id="filter-bar">
        <div class="filter-inner">
            <div class="filter-group">
                <select id="filter-country">
                    <option value="" data-i18n="filterCountry">Ulke</option>
                </select>
            </div>
            <div class="filter-group">
                <select id="filter-city">
                    <option value="" data-i18n="filterCity">Sehir</option>
                </select>
            </div>
            <div class="filter-group search-group">
                <input type="text" id="filter-search" data-i18n="filterSearch" placeholder="Ara...">
            </div>
            <div class="filter-group">
                <select id="filter-sort">
                    <option value="date-desc" data-i18n="filterSortNew">Yeni &rarr; Eski</option>
                    <option value="date-asc" data-i18n="filterSortOld">Eski &rarr; Yeni</option>
                </select>
            </div>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="tr">TR</button>
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="zh">中文</button>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div id="gallery-container" class="gallery-container"></div>
        <div id="pagination-container" class="pagination"></div>
        <div id="map-container" class="map-container" style="display:none;">
            <div id="map" class="map"></div>
        </div>
        <div id="empty-state" class="empty-state" style="display:none;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M2 8h20"/>
                <circle cx="8" cy="14" r="2"/>
                <path d="M14 20l3-4 5 4"/>
            </svg>
            <p class="empty-title" data-i18n="emptyTitle">Henuz kartpostal eklenmemis</p>
            <p class="empty-desc" data-i18n="emptyDesc">Yonetici panelinden ilk kartpostalinizi ekleyin.</p>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <button class="modal-card-nav modal-card-prev" id="modal-prev" title="Onceki">&#8249;</button>
        <button class="modal-card-nav modal-card-next" id="modal-next" title="Sonraki">&#8250;</button>
        <div class="modal-content">
            <button class="modal-close" id="modal-close" title="Kapat">&times;</button>
            <div class="modal-body">
                <div class="modal-images" id="modal-images">
                    <img id="modal-img-front" src="" alt="">
                    <img id="modal-img-back" src="" alt="" style="display:none;">
                </div>
                <div class="modal-info">
                    <h2 class="modal-city"><span id="modal-city"></span><span id="modal-country" class="modal-country-inline"></span></h2>
                    <p id="modal-description" class="modal-description"></p>
                    <p id="modal-description-2" class="modal-description modal-description-secondary" style="display:none;"></p>
                    <p id="modal-translation-note" class="translation-note" style="display:none;"></p>
                    <a id="modal-extra-btn" href="#" class="modal-extra-btn" style="display:none;">
                        🖼 <span data-i18n="hasMoreImages">Bu sayfa başka görseller de içermektedir</span>
                    </a>
                    <a id="modal-open-page" href="#" target="_blank" class="modal-open-btn">
                        <span data-i18n="openNewTab">Yeni sekmede ac</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                            <polyline points="15 3 21 3 21 9"/>
                            <line x1="10" y1="14" x2="21" y2="3"/>
                        </svg>
                    </a>
                </div>
                <div id="modal-map" class="modal-map" style="display:none;"></div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <p data-i18n="footerText">&copy; 2026 Baska Topraklarin Renkleri</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.22/leaflet-maplibre-gl.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/countries.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/data.js"></script>
    <script src="js/map-base.js"></script>
    <script src="js/zoom.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
