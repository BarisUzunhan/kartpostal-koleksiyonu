<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartpostal Detay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/gallery.css">
    <style>
        .detail-page {
            width: 100%;
            max-width: 640px;
            margin: 1.5rem auto;
            padding: 0 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--color-surface);
            text-decoration: none;
            margin-bottom: 1rem;
            font-weight: 500;
            transition: opacity var(--transition);
        }

        .back-link:hover { opacity: 0.8; }

        .detail-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        /* Görseller — her zaman alt alta, eşit boyutlu kutularda (modal ile aynı) */
        .detail-images {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
            background: var(--color-bg-alt);
            padding: 0;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .detail-images .detail-image,
        .detail-extra-stack .detail-image {
            width: 100%;
            max-width: 440px;
            height: auto;
            margin: 0 auto;
            background: var(--color-bg-alt);
            display: block;
            cursor: zoom-in;
            transition: opacity 0.15s;
        }

        .detail-images .detail-image:hover,
        .detail-extra-stack .detail-image:hover {
            opacity: 0.92;
        }

        /* Ekstra görseller — ön/arka ile aynı: alt alta, tam genişlik, kırpmasız */
        .detail-extra-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .detail-info {
            padding: 1.5rem 2rem 2rem;
        }

        .detail-city {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .detail-original-text {
            font-size: 0.85rem;
            font-style: italic;
            color: var(--color-bg-alt);
            background: var(--color-border-light);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            border-left: 3px solid var(--color-accent);
        }

        .detail-description {
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 0.5rem;
        }

        .detail-translation-note {
            font-size: 0.75rem;
            color: var(--color-text-light);
            font-style: italic;
            margin-bottom: 1rem;
        }

        /* Mini harita */
        .detail-section-title {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.5rem 0 0.75rem;
            padding-top: 1rem;
            border-top: 1px solid var(--color-border-light);
            color: var(--color-text);
        }

        .detail-map {
            width: 100%;
            height: 280px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            transition: height 0.3s ease;
        }

        .detail-map.expanded {
            height: 500px;
        }

        .detail-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .map-toggle-btn {
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 500;
            padding: 4px 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: var(--color-surface);
            color: var(--color-text-muted);
            cursor: pointer;
            transition: all var(--transition);
        }

        .map-toggle-btn:hover {
            background: var(--color-border-light);
            color: var(--color-text);
        }

        .detail-description-secondary {
            color: var(--color-text-muted);
            font-size: 0.88rem;
            margin-bottom: 0.5rem;
        }

        /* Benzer kartpostallar */
        .similar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .similar-card {
            position: relative;
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: transform var(--transition);
        }

        .similar-card:hover { transform: translateY(-2px); }

        .similar-card img {
            width: 100%;
            aspect-ratio: 3/2;
            object-fit: cover;
        }

        .similar-card .card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 0.5rem 0.375rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.5));
        }

        .similar-card .card-name {
            font-size: 0.7rem;
            font-weight: 600;
            color: #fff;
        }

        .detail-not-found {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--color-surface);
        }

        .detail-not-found h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .detail-page { margin: 1rem auto; }
            .detail-info { padding: 1.25rem; }
            .detail-city { font-size: 1.4rem; }
            .similar-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="header-brand">
                <img src="images/logo.png" alt="Baska Topraklarin Renkleri" class="header-logo-img">
                <img src="images/headerorta.png" alt="" class="header-plane-img">
            </a>
            <div class="header-right">
                <nav class="main-nav">
                    <a href="index.html" class="nav-link" data-i18n="navHome">Ana Sayfa</a>
                    <a href="index.html?mode=map" class="nav-link" data-i18n="navMap">Harita</a>
                    <a href="about.html" class="nav-link" data-i18n="navAbout">Hakkimda</a>
                    <a href="what-to-do.html" class="nav-link" data-i18n="navWhatToDo">Ne Yapmaliyim?</a>
                    <a href="tags.html" class="nav-link" data-i18n="navTags">Etiketler</a>
                </nav>
                <div class="lang-switcher" id="lang-switcher">
                    <button class="lang-btn active" data-lang="tr">TR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="zh">中文</button>
                </div>
                <button class="lang-toggle" id="lang-toggle" aria-label="Dil" aria-expanded="false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <span id="lang-toggle-code">TR</span>
                </button>
            </div>
        </div>
        <div class="header-controls" id="header-controls">
            <button class="control-btn" id="nav-toggle" aria-label="Menü" aria-expanded="false">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                <span data-i18n="menuToggle">Menü</span>
            </button>
        </div>
    </header>

    <main class="detail-page">
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
            <span data-i18n="backToCollection">Koleksiyona don</span>
        </a>

        <div id="detail-content"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p data-i18n="footerText">&copy; 2026 Baska Topraklarin Renkleri</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.22/leaflet-maplibre-gl.js"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/countries.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/data.js"></script>
    <script src="js/map-base.js"></script>
    <script src="js/zoom.js"></script>
    <script src="js/postcard-page.js"></script>
    <script src="js/analytics.js" defer></script>
</body>
</html>
