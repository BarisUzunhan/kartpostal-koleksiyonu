<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartpostal Detay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .detail-page {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--color-accent);
            text-decoration: none;
            margin-bottom: 1.5rem;
            font-weight: 500;
            transition: color var(--transition);
        }

        .back-link:hover {
            color: var(--color-text);
        }

        .detail-card {
            background: var(--color-surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--color-border-light);
            box-shadow: var(--shadow-md);
        }

        .detail-image-wrapper {
            width: 100%;
            background: var(--color-bg-alt);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-image-wrapper img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
        }

        .detail-info {
            padding: 2rem;
        }

        .detail-city {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .detail-country {
            font-size: 1.1rem;
            color: var(--color-accent);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .detail-date {
            font-size: 0.9rem;
            color: var(--color-text-muted);
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--color-border-light);
        }

        .detail-description {
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .detail-not-found {
            text-align: center;
            padding: 4rem 2rem;
        }

        .detail-not-found h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .detail-page {
                margin: 1rem auto;
            }

            .detail-info {
                padding: 1.25rem;
            }

            .detail-city {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="logo">
                <h1 class="site-title">Kartpostal Koleksiyonu</h1>
                <p class="site-subtitle">Dunyadan Mektuplar</p>
            </div>
        </div>
    </header>

    <main class="detail-page">
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
            Koleksiyona don
        </a>

        <div id="detail-content"></div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>&copy; 2026 Kartpostal Koleksiyonu &mdash; Dunya'nin dort bir yanindan mektuplar.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/postcard-page.js"></script>
</body>
</html>
